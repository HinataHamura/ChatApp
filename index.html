<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════
       TOAST NOTIFICATION (floats top-right, JS controls it)
  ══════════════════════════════════════════════════════════ -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- ═══════════════════════════════════════════════════════
       AUTH OVERLAY
  ══════════════════════════════════════════════════════════ -->
  <div id="authOverlay" class="auth-overlay">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="logo-big">C</div>
        <h2>Welcome to Chat</h2>
        <p class="auth-tagline">Real-time · Persistent · Secure</p>
      </div>

      <div class="auth-tabs">
        <button id="loginTab" class="auth-tab active">Login</button>
        <button id="registerTab" class="auth-tab">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm" class="auth-form active" onsubmit="return false;">
        <div class="auth-field">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="auth-field">
          <label for="loginPassword">Password</label>
          <div class="pass-wrap">
            <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="pass-toggle" data-target="loginPassword" title="Show/hide">👁</button>
          </div>
        </div>
        <div class="auth-error" id="loginError"></div>
        <div class="auth-actions">
          <button id="loginButton" class="auth-btn primary">
            <span class="btn-label">Login</span>
            <span class="btn-spinner" style="display:none;">⏳</span>
          </button>
        </div>
      </form>

      <!-- REGISTER FORM -->
      <form id="registerForm" class="auth-form" onsubmit="return false;">
        <div class="auth-field">
          <label for="registerUsername">Username</label>
          <input id="registerUsername" type="text" placeholder="coolname" autocomplete="username" required>
        </div>
        <div class="auth-field">
          <label for="registerEmail">Email</label>
          <input id="registerEmail" type="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="auth-field">
          <label for="registerPassword">Password</label>
          <div class="pass-wrap">
            <input id="registerPassword" type="password" placeholder="min 6 chars" autocomplete="new-password" required>
            <button type="button" class="pass-toggle" data-target="registerPassword" title="Show/hide">👁</button>
          </div>
        </div>
        <div class="auth-error" id="registerError"></div>
        <div class="auth-actions">
          <button id="registerButton" class="auth-btn primary">
            <span class="btn-label">Create Account</span>
            <span class="btn-spinner" style="display:none;">⏳</span>
          </button>
        </div>
      </form>

    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       MAIN APP
  ══════════════════════════════════════════════════════════ -->
  <div id="mainApp" class="app">

    <!-- TOP BAR ──────────────────────────────────────────── -->
    <div class="topbar">
      <div class="brand">
        <div class="logo">C</div>
        <div>
          <div class="title">Chat App</div>
          <div id="userSubtitle" class="subtitle">Not logged in</div>
        </div>
      </div>

      <div class="status">
        <!-- Connection status -->
        <div id="statusPill" class="pill pill-muted">
          <span id="statusDot" class="dot"></span>
          <span id="statusText">Disconnected</span>
        </div>

        <!-- Current channel -->
        <div id="channelPill" class="pill pill-muted">
          Channel — none
        </div>

        <!-- Unread badge (shown when there are unread messages) -->
        <div id="unreadPill" class="pill pill-unread" style="display:none;" title="Unread messages">
          <span id="unreadCount">0</span> unread
        </div>

        <button id="logoutBtn" class="btn small danger">Logout</button>
      </div>
    </div>

    <!-- MAIN BODY: conv list + chat + activity ──────────── -->
    <div class="layout">

      <!-- CONVERSATION LIST (left sidebar) ────────────── -->
      <div class="conv-sidebar" id="convSidebar">

        <!-- Sidebar search -->
        <div class="conv-search-wrap">
          <input id="convSearch" class="conv-search" placeholder="🔍  Search chats or people…" autocomplete="off">
        </div>

        <!-- Tabs: Groups | DMs | People -->
        <div class="conv-tabs">
          <button class="conv-tab active" data-tab="groups">Groups</button>
          <button class="conv-tab" data-tab="dms">DMs</button>
          <button class="conv-tab" data-tab="people">People</button>
        </div>

        <!-- New group row -->
        <div class="new-group-row" id="newGroupRow">
          <input id="newGroupInput" class="new-group-input" placeholder="New group name…" maxlength="30">
          <button id="newGroupBtn" class="btn primary small">+ Join</button>
        </div>

        <!-- Conversation list -->
        <div class="conv-list" id="convList">
          <div class="conv-empty" id="convEmpty">Loading…</div>
        </div>

      </div>

      <!-- CHAT COLUMN ──────────────────────────────────── -->
      <div class="chat" id="chatPanel">

        <!-- Chat header (shown when a channel is open) -->
        <div class="chat-header" id="chatHeader" style="display:none;">
          <button class="back-btn" id="backBtn" title="Back to list">←</button>
          <div class="chat-header-info">
            <div class="chat-header-name" id="chatHeaderName"></div>
            <div class="chat-header-sub" id="chatHeaderSub"></div>
          </div>
          <div class="chat-header-actions">
            <!-- Search inside channel -->
            <div class="searchbar-inline">
              <input id="searchInput" class="search-input" type="search" placeholder="Search…" autocomplete="off">
              <button id="searchBtn" class="btn small">Go</button>
              <button id="searchCloseBtn" class="btn small" style="display:none;">✕</button>
            </div>
            <button id="membersBtn" class="btn small" title="Members">👥</button>
            <button id="leaveBtn" class="btn small" title="Leave channel">Leave</button>
          </div>
        </div>

        <!-- No chat selected placeholder -->
        <div class="no-chat-placeholder" id="noChatPlaceholder">
          <div style="font-size:48px;margin-bottom:12px;">💬</div>
          <div style="font-size:16px;font-weight:600;margin-bottom:6px;">Select a conversation</div>
          <div style="font-size:13px;color:var(--muted);">Choose a group or DM from the left,<br>or go to People to start a new chat.</div>
        </div>

        <!-- Search results overlay (shown over messages when searching) -->
        <div id="searchResults" class="search-overlay" style="display:none;"></div>

        <!-- Message list -->
        <div id="chatBox" class="messages"></div>

        <!-- Typing indicator -->
        <div id="typingBar" class="typing-bar" aria-live="polite"></div>

        <!-- Composer -->
        <div class="composer">
          <!-- Hidden file input -->
          <input
            id="fileInput"
            type="file"
            style="display:none;"
            accept="image/*,.pdf,.txt,.zip,.mp4,.mp3"
            aria-label="Attach file"
          >
          <!-- Attach button -->
          <button id="attachBtn" class="btn attach-btn" title="Attach file">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>

          <!-- Message input -->
          <input
            id="message"
            placeholder="Type your message… (Enter to send)"
            autocomplete="off"
            maxlength="2000"
          />

          <!-- Send button -->
          <button id="sendBtn" class="btn primary send-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>

        <!-- Character counter (shown when near limit) -->
        <div id="charCount" class="char-count" style="display:none;"></div>

      </div>

      <!-- SIDE PANEL (right) ──────────────────────────── -->
      <div class="side">

        <!-- Activity log -->
        <div class="side-section">
          <div class="side-head">
            <div class="side-title">Activity</div>
            <button id="clearLogBtn" class="btn small">Clear</button>
          </div>
          <div id="logBox" class="log"></div>
        </div>

        <!-- Divider -->
        <div class="side-divider"></div>

        <!-- Online users -->
        <div class="side-section side-section-online">
          <div class="side-head">
            <div class="side-title">Online</div>
          </div>
          <div id="onlineBox" class="log online-log"></div>
        </div>

      </div>
    </div><!-- end .layout -->
  </div><!-- end #mainApp -->

  <!-- ═══════════════════════════════════════════════════════
       INLINE SCRIPTS — small helpers that don't need the
       full script.js to be loaded yet
  ══════════════════════════════════════════════════════════ -->
  <script>
    // ── Password show/hide toggles ──────────────────────────
    document.querySelectorAll('.pass-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const inp = document.getElementById(btn.dataset.target);
        if (!inp) return;
        inp.type = inp.type === 'password' ? 'text' : 'password';
        btn.textContent = inp.type === 'password' ? '👁' : '🙈';
      });
    });

    // ── Auth form inline error display ──────────────────────
    // script.js can call showAuthError('loginError', 'Bad password') instead of alert()
    window.showAuthError = function(id, msg) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    };

    // ── Toast helper (global) ───────────────────────────────
    let toastTimer;
    window.showToast = function(msg, type = 'info', ms = 3000) {
      const t = document.getElementById('toast');
      if (!t) return;
      t.textContent = msg;
      t.className = `toast toast-${type} toast-show`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.className = 'toast'; }, ms);
    };

    // ── Global unread badge updater ─────────────────────────
    window.setUnreadPill = function(total) {
      const pill  = document.getElementById('unreadPill');
      const count = document.getElementById('unreadCount');
      if (!pill || !count) return;
      if (total > 0) {
        count.textContent = total;
        pill.style.display = '';
      } else {
        pill.style.display = 'none';
      }
    };

    // ── Char counter for message input ──────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      const inp     = document.getElementById('message');
      const counter = document.getElementById('charCount');
      if (!inp || !counter) return;
      inp.addEventListener('input', () => {
        const len = inp.value.length;
        const max = parseInt(inp.maxLength);
        if (len > max * 0.8) {
          counter.textContent = `${len} / ${max}`;
          counter.style.display = 'block';
          counter.style.color = len >= max ? '#ef4444' : 'var(--muted)';
        } else {
          counter.style.display = 'none';
        }
      });

      // ── File attach button wires to the real fileInput ────
      const attachBtn = document.getElementById('attachBtn');
      const fileInput = document.getElementById('fileInput');
      if (attachBtn && fileInput) {
        attachBtn.addEventListener('click', () => fileInput.click());
      }

      // ── Search wiring (also wired in script.js, safe to dupe) ──
      const searchBtn      = document.getElementById('searchBtn');
      const searchCloseBtn = document.getElementById('searchCloseBtn');
      // script.js handles the actual doSearch() / closeSearch() calls
    });
  </script>

  <!-- ═══════════════════════════════════════════════════════
       MOBILE ACTIVITY DRAWER (only visible on small screens)
  ══════════════════════════════════════════════════════════ -->

  <!-- Floating toggle button -->
  <button class="activity-toggle" id="activityToggle" title="Activity &amp; Online users">📋</button>

  <!-- Slide-up drawer -->
  <div class="side-drawer" id="sideDrawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title">Activity &amp; Online</div>

    <div style="margin-bottom:10px;">
      <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;">Activity</div>
      <div id="logBoxMobile" class="log" style="max-height:160px;overflow-y:auto;flex:none;padding:0;gap:4px;"></div>
    </div>

    <div>
      <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;">Online</div>
      <div id="onlineBoxMobile" class="log" style="max-height:120px;overflow-y:auto;flex:none;padding:0;gap:4px;"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
